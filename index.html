<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Surat DPRD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f9; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; font-weight: bold; }
        .btn-box {
            background: white; border: 3px solid #000; border-radius: 20px;
            padding: 30px 15px; text-align: center; cursor: pointer;
            transition: 0.2s; font-weight: bold; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-box:hover { background: #000; color: #fff; transform: translateY(-3px); }
        .history-table { background: white; border-radius: 15px; margin-top: 30px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container" style="max-width: 800px;">
    <div class="header">
        Aplikasi Penomoran SPT dan SPPD Sekretariat dan <br>
        DPRD Kabupaten Padang Pariaman
    </div>

    <div class="row g-3">
        <div class="col-6"><div class="btn-box" onclick="openForm('SPT_SEK','SPT SEKRETARIAT')">Nomor<br>SPT SEKRETARIAT</div></div>
        <div class="col-6"><div class="btn-box" onclick="openForm('SPPD_SEK','SPPD SEKRETARIAT')">Nomor<br>SPPD SEKRETARIAT</div></div>
        <div class="col-6"><div class="btn-box" onclick="openForm('SPT_DPRD','SPT DPRD')">Nomor<br>SPT DPRD</div></div>
        <div class="col-6"><div class="btn-box" onclick="openForm('SPPD_DPRD','SPPD DPRD')">Nomor<br>SPPD DPRD</div></div>
    </div>

    <div class="history-table">
        <table class="table table-hover mb-0">
            <thead class="table-dark"><tr><th>Nomor Surat</th><th>Perihal</th><th>User</th></tr></thead>
            <tbody id="histBody"><tr><td colspan="3" class="text-center">Memuat riwayat...</td></tr></tbody>
        </table>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalForm" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form id="mainForm" class="modal-content" style="border-radius:15px">
            <div class="modal-header"><h6 id="modalTitle"></h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="hidden" id="tipe">
                <div class="mb-2"><label class="small fw-bold">Email Anda</label><input type="email" id="email" class="form-control" required></div>
                <div class="mb-2"><label class="small fw-bold">Perihal</label><textarea id="perihal" class="form-control" required></textarea></div>
                <div class="mb-2"><label class="small fw-bold">Tujuan</label><input type="text" id="tujuan" class="form-control" required></div>
                <div class="row">
                    <div class="col-6"><label class="small fw-bold">Tanggal</label><input type="date" id="tgl" class="form-control" required></div>
                    <div class="col-6"><label class="small fw-bold">Lama (Hari)</label><input type="number" id="lama" class="form-control" required></div>
                </div>
                <div id="res" class="mt-3 alert alert-success" style="display:none">Nomor: <b id="noRes"></b></div>
            </div>
            <div class="modal-footer"><button type="submit" id="btnSub" class="btn btn-dark w-100">Dapatkan Nomor</button></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "https://script.google.com/macros/s/AKfycbyQ0jrr_LJhKGDfcyZyMHdvLIHZJrBQhkJXFWBrn2heHymz7J9Lf4oou6lJ3Pcv__O_/exec"; // <--- GANTI DISINI
    const modal = new bootstrap.Modal(document.getElementById('modalForm'));

    window.onload = () => fetch(API).then(r => r.json()).then(d => render(d.riwayat));

    function openForm(tipe, label) {
        document.getElementById('tipe').value = tipe;
        document.getElementById('modalTitle').innerText = "Form " + label;
        document.getElementById('res').style.display = 'none';
        document.getElementById('mainForm').reset();
        modal.show();
    }

    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        const b = document.getElementById('btnSub');
        b.disabled = true; b.innerText = "Memproses...";
        
        const payload = {
            tipe: document.getElementById('tipe').value,
            userEmail: document.getElementById('email').value,
            perihal: document.getElementById('perihal').value,
            tujuan: document.getElementById('tujuan').value,
            tanggal: document.getElementById('tgl').value,
            lama: document.getElementById('lama').value
        };

        try {
            const r = await fetch(API, { method:'POST', body: JSON.stringify(payload) });
            const d = await r.json();
            document.getElementById('res').style.display = 'block';
            document.getElementById('noRes').innerText = d.nomor;
            render(d.riwayat);
            setTimeout(() => modal.hide(), 4000);
        } catch(e) { alert("Gagal!"); }
        finally { b.disabled = false; b.innerText = "Dapatkan Nomor"; }
    };

    function render(data) {
        document.getElementById('histBody').innerHTML = data.map(r => `<tr><td><small><b>${r[0]}</b></small></td><td><small>${r[2]}</small></td><td><small>${r[6].split('@')[0]}</small></td></tr>`).join('');
    }
</script>
</body>
</html>
