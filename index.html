<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penomoran DPRD Padang Pariaman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f9; font-family: sans-serif; padding: 20px; }
        .header { text-align: center; margin-bottom: 40px; font-weight: bold; }
        .btn-box {
            background: white; border: 3px solid #000; border-radius: 20px;
            padding: 30px; text-align: center; cursor: pointer;
            transition: 0.2s; font-weight: bold; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-box:hover { background: #000; color: #fff; transform: translateY(-3px); }
        .history-card { background: white; border-radius: 15px; margin-top: 30px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container" style="max-width: 900px;">
    <div class="header">
        Aplikasi Penomoran SPT dan SPPD Sekretariat dan <br>
        DPRD Kabupaten Padang Pariaman
    </div>

    <div class="row g-4">
        <div class="col-6"><div class="btn-box" onclick="openForm('SPT_SEK','SPT SEKRETARIAT')">Nomor<br>SPT SEKRETARIAT</div></div>
        <div class="col-6"><div class="btn-box" onclick="openForm('SPPD_SEK','SPPD SEKRETARIAT')">Nomor<br>SPPD SEKRETARIAT</div></div>
        <div class="col-6"><div class="btn-box" onclick="openForm('SPT_DPRD','SPT DPRD')">Nomor<br>SPT DPRD</div></div>
        <div class="col-6"><div class="btn-box" onclick="openForm('SPPD_DPRD','SPPD DPRD')">Nomor<br>SPPD DPRD</div></div>
    </div>

    <div class="history-card">
        <h6 class="fw-bold mb-3">Riwayat Penomoran</h6>
        <div class="table-responsive">
            <table class="table table-hover align-middle" style="font-size: 0.85rem;">
                <thead class="table-light">
                    <tr>
                        <th>Nomor Surat</th>
                        <th>Nama Ditugaskan</th>
                        <th>Perihal</th>
                        <th>User</th>
                    </tr>
                </thead>
                <tbody id="histBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Form -->
<div class="modal fade" id="modalForm" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form id="mainForm" class="modal-content" style="border-radius:15px">
            <div class="modal-header border-0"><h6 id="modalTitle" class="fw-bold"></h6><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body pt-0">
                <input type="hidden" id="tipe">
                <div class="mb-2"><label class="small fw-bold">Email Penginput</label><input type="email" id="email" class="form-control" required placeholder="email@gmail.com"></div>
                <div class="mb-2"><label class="small fw-bold">Nama yang Ditugaskan</label><input type="text" id="nama" class="form-control" required placeholder="Nama Pegawai / Anggota"></div>
                <div class="mb-2"><label class="small fw-bold">Perihal</label><textarea id="perihal" class="form-control" required></textarea></div>
                <div class="row">
                    <div class="col-6"><label class="small fw-bold">Tanggal Pergi</label><input type="date" id="tgl" class="form-control" required></div>
                    <div class="col-6"><label class="small fw-bold">Lama (Hari)</label><input type="number" id="lama" class="form-control" required min="1"></div>
                </div>
                <div id="resBox" class="mt-3 alert alert-success" style="display:none">Nomor Berhasil Dibuat: <br><strong id="noRes"></strong></div>
            </div>
            <div class="modal-footer border-0"><button type="submit" id="btnSub" class="btn btn-dark w-100 py-2">Simpan & Ambil Nomor</button></div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "https://script.google.com/macros/s/AKfycbzhPSmllU2izZVOSjkJ7G5ti02Ymft-VzSa8Ep2WCcOghBPe49VcP9o9PaJvTyD5FcB/exec"; // <--- GANTI DISINI
    const modal = new bootstrap.Modal(document.getElementById('modalForm'));

    // Load awal
    fetch(API).then(r => r.json()).then(d => render(d.riwayat));

    function openForm(tipe, label) {
        document.getElementById('tipe').value = tipe;
        document.getElementById('modalTitle').innerText = "Input " + label;
        document.getElementById('resBox').style.display = 'none';
        document.getElementById('mainForm').reset();
        modal.show();
    }

    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        const b = document.getElementById('btnSub');
        b.disabled = true; b.innerText = "Menyimpan...";
        
        const payload = {
            tipe: document.getElementById('tipe').value,
            userEmail: document.getElementById('email').value,
            nama: document.getElementById('nama').value,
            perihal: document.getElementById('perihal').value,
            tanggal: document.getElementById('tgl').value,
            lama: document.getElementById('lama').value
        };

        try {
            const r = await fetch(API, { method:'POST', body: JSON.stringify(payload) });
            const d = await r.json();
            document.getElementById('resBox').style.display = 'block';
            document.getElementById('noRes').innerText = d.nomor;
            render(d.riwayat);
            setTimeout(() => modal.hide(), 4000);
        } catch(e) { alert("Gagal mengambil nomor"); }
        finally { b.disabled = false; b.innerText = "Simpan & Ambil Nomor"; }
    };

    function render(data) {
        if(!data) return;
        document.getElementById('histBody').innerHTML = data.map(r => `
            <tr>
                <td><strong>${r[0]}</strong></td>
                <td>${r[2]}</td>
                <td>${r[3]}</td>
                <td><small class="text-muted">${r[6].split('@')[0]}</small></td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
