<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penomoran DPRD Padang Pariaman</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .header-section { text-align: center; margin: 40px 0; }
        .card-menu {
            border: 2px solid #000; border-radius: 20px; padding: 25px;
            text-align: center; cursor: pointer; transition: 0.2s;
            background: #fff; font-weight: bold; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .card-menu:hover { background: #000; color: #fff; }
        .table-history { font-size: 0.8rem; background: white; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h5>Aplikasi Penomoran SPT dan SPPD Sekretariat dan</h5>
        <h5>DPRD Kabupaten Padang Pariaman</h5>
    </div>

    <!-- Tombol Menu Utama Sesuai Gambar -->
    <div class="row g-3 mb-5">
        <div class="col-6 col-md-3">
            <div class="card-menu" onclick="showModal('SPT_SEK', 'SPT SEKRETARIAT')">Nomor<br>SPT SEKRETARIAT</div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card-menu" onclick="showModal('SPPD_SEK', 'SPPD SEKRETARIAT')">Nomor<br>SPPD SEKRETARIAT</div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card-menu" onclick="showModal('SPT_DPRD', 'SPT DPRD')">Nomor<br>SPT DPRD</div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card-menu" onclick="showModal('SPPD_DPRD', 'SPPD DPRD')">Nomor<br>SPPD DPRD</div>
        </div>
    </div>

    <!-- Tabel Riwayat -->
    <div class="row">
        <div class="col-12">
            <h6 class="text-muted mb-3">5 Riwayat Terakhir:</h6>
            <div class="table-responsive table-history shadow-sm">
                <table class="table table-bordered mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Nomor Surat</th>
                            <th>Tipe</th>
                            <th>Perihal</th>
                            <th>Tujuan</th>
                            <th>User</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="5" class="text-center">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Form -->
<div class="modal fade" id="formModal" tabindex="-1">
    <div class="modal-dialog">
        <form id="suratForm" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Form</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="tipe">
                <div class="mb-3">
                    <label class="form-label">Email Anda (Login Bukti)</label>
                    <input type="email" id="userEmail" class="form-control" required placeholder="nama@email.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Perihal</label>
                    <textarea id="perihal" class="form-control" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tujuan</label>
                    <input type="text" id="tujuan" class="form-control" required>
                </div>
                <div class="row">
                    <div class="col-6">
                        <label class="form-label">Tanggal</label>
                        <input type="date" id="tanggal" class="form-control" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Lama (Hari)</label>
                        <input type="number" id="lama" class="form-control" required>
                    </div>
                </div>
                <div id="notif" class="mt-3 alert alert-success" style="display:none"></div>
            </div>
            <div class="modal-footer">
                <button type="submit" id="btnSubmit" class="btn btn-primary w-100">Dapatkan Nomor</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw8SwVvp2Uci6pWgHR-dTeYs7wXDxiwbZSos_r1Rv6jGQEWWK5Uns0Wa2uhEY0WwWaV/exec"; // <--- GANTI INI
    const myModal = new bootstrap.Modal(document.getElementById('formModal'));
    
    // Load riwayat saat start
    window.onload = () => fetch(WEB_APP_URL).then(r => r.json()).then(d => renderTable(d.riwayat));

    function showModal(tipe, judul) {
        document.getElementById('tipe').value = tipe;
        document.getElementById('modalTitle').innerText = "Input " + judul;
        document.getElementById('notif').style.display = 'none';
        document.getElementById('suratForm').reset();
        myModal.show();
    }

    document.getElementById('suratForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "Memproses...";

        const payload = {
            tipe: document.getElementById('tipe').value,
            userEmail: document.getElementById('userEmail').value,
            perihal: document.getElementById('perihal').value,
            tujuan: document.getElementById('tujuan').value,
            tanggal: document.getElementById('tanggal').value,
            lama: document.getElementById('lama').value
        };

        try {
            const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            
            if(data.status === 'success') {
                document.getElementById('notif').style.display = 'block';
                document.getElementById('notif').innerHTML = `Berhasil!<br>Nomor: <b>${data.nomor}</b>`;
                renderTable(data.riwayat);
                setTimeout(() => { myModal.hide(); }, 3000);
            }
        } catch (err) {
            alert("Terjadi kesalahan koneksi");
        } finally {
            btn.disabled = false; btn.innerText = "Dapatkan Nomor";
        }
    };

    function renderTable(data) {
        const body = document.getElementById('historyBody');
        body.innerHTML = data.map(row => `
            <tr>
                <td><b>${row[0]}</b></td>
                <td>${row[1]}</td>
                <td>${row[2]}</td>
                <td>${row[3]}</td>
                <td>${row[6].split('@')[0]}</td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
